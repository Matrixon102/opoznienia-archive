name: Archive PKP Delays

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2,3 * * *'

permissions:
  contents: write

jobs:
  archive:
    runs-on: ubuntu-latest

    steps:
      - name: Check local schedule window
        id: warsaw_time
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          hour=$(TZ=Europe/Warsaw date +%H)
          if [ "$hour" = "04" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out repository
        if: steps.warsaw_time.outputs.run == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        if: steps.warsaw_time.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Archive missing files
        if: steps.warsaw_time.outputs.run == 'true'
        run: python scripts/archive_delays.py

      - name: Commit and push changes
        if: steps.warsaw_time.outputs.run == 'true'
        shell: bash
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add archive index.json
          git commit -m "Archive PKP delays for $(TZ=Europe/Warsaw date +%F)"
          git push
